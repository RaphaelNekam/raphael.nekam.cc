<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raphael</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/environments/RoomEnvironment.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0c;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .icon-btn {
      position: relative;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      transition: all 0.25s ease;
      color: #d1d5db;
    }

    .icon-btn:hover {
      transform: scale(1.2);
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    .tooltip {
      position: absolute;
      left: 70px;
      white-space: nowrap;
      background: rgba(0,0,0,0.8);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .icon-btn:hover .tooltip {
      opacity: 1;
      transform: translateX(0);
    }

    /* Hide tooltips and slightly scale down icons for mobile to ensure a perfect fit */
    @media (max-width: 1200px) {
      .tooltip {
        display: none !important;
      }
      .icon-btn {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

<body class="text-white font-sans">

<!-- UI -->
<!-- Added pointer-events-none to let touch events pass through to the 3D canvas -->
<div class="relative z-10 flex flex-col min-[1200px]:flex-row h-screen pointer-events-none">

  <!-- Sidebar / Taskbar -->
  <div class="w-[calc(100%-2rem)] max-w-sm min-[1200px]:max-w-none min-[1200px]:w-24 mx-auto min-[1200px]:mx-4 mb-6 min-[1200px]:mb-4 mt-auto min-[1200px]:mt-4 rounded-2xl glass flex flex-row min-[1200px]:flex-col items-center justify-center py-4 min-[1200px]:py-6 px-4 min-[1200px]:px-0 gap-4 min-[1200px]:gap-6 order-2 min-[1200px]:order-1 pointer-events-auto">

    <!-- Sidebar / Taskbar Icons -->
<a href="#about" class="icon-btn cursor-pointer">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M6 20c0-4 12-4 12 0"/>
  </svg>
  <span class="tooltip">About</span>
</a>

<!-- Replacement for Work: Blog Icon -->
<a href="#blog" class="icon-btn cursor-pointer">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
  </svg>
  <span class="tooltip">Blog</span>
</a>

<a href="#projects" class="icon-btn cursor-pointer">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/>
    <polyline points="8 6 2 12 8 18"/>
  </svg>
  <span class="tooltip">Projects</span>
</a>

<a href="https://cloud.nekam.cc" target="_blank" rel="noopener noreferrer" class="icon-btn cursor-pointer">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-.6-3.7-3.8-6.5-7.6-6.5-3 0-5.7 1.7-7 4.3C1.6 8.5 0 10.6 0 13c0 3.3 2.7 6 6 6h11.5z"/>
  </svg>
  <span class="tooltip">Cloud</span>
</a>

<a href="#contact" class="icon-btn cursor-pointer">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4h16v16H4z"/>
    <path d="M22 6l-10 7L2 6"/>
  </svg>
  <span class="tooltip">Contact</span>
</a>

  </div>

  <!-- Content -->
  <div class="flex-1 flex flex-col min-[1200px]:flex-row items-center justify-start min-[1200px]:justify-between px-6 min-[1200px]:px-16 pt-16 min-[1200px]:pt-0 order-1 min-[1200px]:order-2 w-full pointer-events-none">

    <div id="textBlock" class="max-w-xl text-center min-[1200px]:text-left pointer-events-auto">
      <p class="text-gray-400">HEY, I'M</p>

      <h1 class="text-5xl min-[1200px]:text-6xl font-bold mt-2 min-[1200px]:mt-0">
        <span class="text-yellow-400">RAPHAEL</span>
      </h1>

      <p class="mt-1 text-gray-400">
        Welcome to my personal website.
      </p>
    </div>

    <div class="hidden min-[1200px]:block"></div>
  </div>
</div>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b0c);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.75;
document.body.appendChild(renderer.domElement);

// Environment
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.RoomEnvironment();
scene.environment = pmremGenerator.fromScene(envScene).texture;

// Camera
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(-Math.PI, 0, -10);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;
controls.enablePan = false;
controls.enableRotate = false; // DISABLED: Prevents the camera from fighting the model rotation on touch devices
controls.enableDamping = true;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 6, -5);
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x111111, 0.5);
scene.add(hemiLight);

// Particles
const particleCount = 1200;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 30;     
  positions[i * 3 + 1] = (Math.random() - 0.5) * 20; 
  positions[i * 3 + 2] = (Math.random() - 0.5) * 30; 
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.05,
  transparent: true,
  opacity: 0.6,
  depthWrite: false
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

// Mouse & Touch tracking
let mouse = { x: 0, y: 0 };
let model;

// Desktop Mouse
window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Mobile Touch handling function
function handleTouch(e) {
  if (e.touches.length > 0) {
    mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
  }
}

// Added touchstart so it reacts immediately upon touching, not just moving
window.addEventListener("touchstart", handleTouch, { passive: true });
window.addEventListener("touchmove", handleTouch, { passive: true });

// Load Model
const loader = new THREE.GLTFLoader();
loader.load("assets/giraffe_head_study.glb", (gltf) => {
  model = gltf.scene;
  scene.add(model);
  updateModelPosition();
});

// Dynamic positioning - handles responsive breakpoint at 1200px
function updateModelPosition() {
  if (!model) return;

  if (window.innerWidth > 1200) {
    // Desktop View: Offset model to right of text
    const textRect = document.getElementById("textBlock").getBoundingClientRect();
    const centerX = (textRect.right + window.innerWidth) / 2;
    const normalizedX = (centerX / window.innerWidth) - 1 - 1.3;

    model.position.x = normalizedX;
    model.position.y = 0.4;
    model.scale.set(1.2, 1.2, 1.2);
  } else {
    // Mobile View: Centered, scaled down, shifted down slightly to leave space for text
    model.position.x = 0;
    model.position.y = -0.2; 
    model.scale.set(0.9, 0.9, 0.9); // DECREASED: Made the giraffe smaller for mobile
  }
}

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateModelPosition();
});

// Animate
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  if (particles) {
    particles.rotation.y += 0.0005;
    particles.rotation.x += 0.0002;
  }

  if (model) {
    // Smooth interpolation towards target rotation
    // Check width to determine which offset to use
    const offset = (window.innerWidth <= 1200) ? 0.8 : 0.2;
    
    // Apply the rotation using the dynamic offset
    const targetY = (mouse.x + offset) * 0.4;
    const targetX = (mouse.y * 0.25);

    model.rotation.y += (targetY - model.rotation.y) * 0.08;
    model.rotation.x += (targetX - model.rotation.x) * 0.08;
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
