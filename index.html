<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giraffe Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/environments/RoomEnvironment.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0c;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .icon-btn {
      position: relative;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      transition: all 0.25s ease;
      color: #d1d5db;
    }

    .icon-btn:hover {
      transform: scale(1.2);
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    .tooltip {
      position: absolute;
      left: 70px;
      white-space: nowrap;
      background: rgba(0,0,0,0.8);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .icon-btn:hover .tooltip {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>

<body class="text-white font-sans">

<!-- UI -->
<div class="relative z-10 flex h-screen">

  <!-- Sidebar -->
  <div class="w-24 m-4 rounded-2xl glass flex flex-col items-center py-6 gap-6">

    <div class="icon-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10L12 3l9 7v10a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/>
      </svg>
      <span class="tooltip">Home</span>
    </div>

    <div class="icon-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M6 20c0-4 12-4 12 0"/>
      </svg>
      <span class="tooltip">About</span>
    </div>

    <div class="icon-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="7" width="18" height="13" rx="2"/>
        <path d="M16 3H8v4h8V3z"/>
      </svg>
      <span class="tooltip">Work</span>
    </div>

    <div class="icon-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span class="tooltip">Projects</span>
    </div>

    <div class="icon-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16v16H4z"/>
        <path d="M22 6l-10 7L2 6"/>
      </svg>
      <span class="tooltip">Contact</span>
    </div>

  </div>

  <!-- Content -->
  <div class="flex-1 flex items-center justify-between px-16">

    <div id="textBlock" class="max-w-xl">
      <p class="text-gray-400">HEY, I'M</p>

      <h1 class="text-6xl font-bold">
        <span class="text-yellow-400">Raphael</span>
      </h1>

      <p class="mt-4 text-gray-400">
        Welcome to my personal website.
      </p>
    </div>

    <div></div>
  </div>
</div>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b0c);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.75;
document.body.appendChild(renderer.domElement);

// Environment (RESTORED)
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.RoomEnvironment();
scene.environment = pmremGenerator.fromScene(envScene).texture;

// Camera
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(-Math.PI, 0, -10);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;
controls.enablePan = false;
controls.enableDamping = true;

// Lights (RESTORED)
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 6, -5);
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x111111, 0.5);
scene.add(hemiLight);

// Particles (background)
const particleCount = 1200;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 30;     // X spread
  positions[i * 3 + 1] = (Math.random() - 0.5) * 20; // Y spread
  positions[i * 3 + 2] = (Math.random() - 0.5) * 30; // Z spread
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.05,
  transparent: true,
  opacity: 0.6,
  depthWrite: false
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

// Mouse
let mouse = { x: 0, y: 0 };
let model;

window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Load Model
const loader = new THREE.GLTFLoader();
loader.load("assets/giraffe_head_study.glb", (gltf) => {
  model = gltf.scene;
  model.scale.set(1.2,1.2,1.2);
  scene.add(model);
  updateModelPosition();
});

// Dynamic positioning
function updateModelPosition() {
  if (!model) return;

  const textRect = document.getElementById("textBlock").getBoundingClientRect();
  const centerX = (textRect.right + window.innerWidth) / 2;
  const normalizedX = (centerX / window.innerWidth) - 1 - 1.3;

  model.position.x = normalizedX;
  model.position.y = 0.4;
}

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateModelPosition();
});

// Animate
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  if (particles) {
  particles.rotation.y += 0.0005;
  particles.rotation.x += 0.0002;
}

  if (model) {
    model.rotation.y += (mouse.x * 0.4 - model.rotation.y) * 0.08;
    model.rotation.x += (mouse.y * 0.25 - model.rotation.x) * 0.08;
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
