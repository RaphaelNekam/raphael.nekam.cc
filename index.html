<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giraffe Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/environments/RoomEnvironment.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #0b0b0c; }
    canvas { position: fixed; top: 0; left: 0; z-index: 0; }
  </style>
</head>
<body class="text-white font-sans">

<!-- UI Overlay -->
<div class="relative z-10 flex h-screen">

  <!-- Sidebar -->
  <div class="w-20 bg-black/40 backdrop-blur flex flex-col items-center py-6 gap-6">
    <div class="text-yellow-400 text-2xl">🦒</div>
    <button>🏠</button>
    <button>👤</button>
    <button>💼</button>
    <button>💻</button>
    <button>✉️</button>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-between px-16">

    <!-- Text -->
    <div class="max-w-xl">
      <p class="text-gray-400">HEY, I'M</p>
      <h1 class="text-6xl font-bold leading-tight">
        <span class="block">GIRAFFE</span>
        <span class="text-yellow-400">DEVELOPER</span>
        <span class="text-yellow-400">DESIGNER</span>
      </h1>

      <p class="mt-4 text-gray-400">
        I build engaging digital experiences with code and creativity.
      </p>

      <button class="mt-6 px-6 py-3 border border-yellow-400 rounded-full hover:bg-yellow-400 hover:text-black transition">
        VIEW MY WORK →
      </button>
    </div>

    <!-- Right space (empty so giraffe shows behind) -->
    <div class="w-[400px]"></div>

  </div>
</div>

<script>
// -----------------------------
// Scene
// -----------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b0c);

// -----------------------------
// Renderer
// -----------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.75;
document.body.appendChild(renderer.domElement);

// -----------------------------
// Environment
// -----------------------------
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.RoomEnvironment();
scene.environment = pmremGenerator.fromScene(envScene).texture;

// -----------------------------
// Camera
// -----------------------------
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(-Math.PI, 0, -10);

// -----------------------------
// Controls
// -----------------------------
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.enablePan = false;

// -----------------------------
// Lights
// -----------------------------
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 6, -5);
dirLight.castShadow = true;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x111111, 0.5);
scene.add(hemiLight);

// -----------------------------
// Mouse
// -----------------------------
let mouse = { x: 0, y: 0 };
let model;

window.addEventListener("mousemove", (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// -----------------------------
// Load Model
// -----------------------------
const loader = new THREE.GLTFLoader();
loader.load("assets/giraffe_head_study.glb", (gltf) => {
  model = gltf.scene;

  model.position.set(-2, 0.4, 0); // move right side
  scale = 1.2
  model.scale.set(scale, scale, scale);

  model.traverse((child) => {
    if (!child.isMesh) return;

    child.castShadow = true;
    child.receiveShadow = true;

    const isEye = (child.name || "").toLowerCase().includes("eye");

    if (child.material) {
      child.material.roughness = Math.min(1, (child.material.roughness || 0.5) * 1.1 + 0.25);
      child.material.envMapIntensity = isEye ? 1.8 : 0.9;

      if (isEye) {
        child.material.roughness = 0.08;
        child.material.clearcoat = 1.0;
        child.material.clearcoatRoughness = 0.08;
      }

      child.material.needsUpdate = true;
    }
  });

  scene.add(model);
});

// -----------------------------
// Resize
// -----------------------------
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// -----------------------------
// Animate
// -----------------------------
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  if (model) {
    model.rotation.y += (mouse.x * 0.4 - model.rotation.y) * 0.08;
    model.rotation.x += (mouse.y * 0.25 - model.rotation.x) * 0.08;
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
